# ════════════════════════════════════════════════════════════════════
#  ChatBantu v2 — Nginx Reverse Proxy
#  Render only exposes ONE external port ($PORT).
#  This config multiplexes ALL traffic through that single port:
#    /ws/*  → WebSocket relay (wsrelay on port 8081)
#    /*     → Bantu HTTP server (port 8080)
# ════════════════════════════════════════════════════════════════════

worker_processes 1;
daemon off;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout combined;
    default_type application/octet-stream;

    # Upstreams
    upstream bantu_http {
        server 127.0.0.1:8080;
    }

    upstream ws_relay {
        server 127.0.0.1:8081;
    }

    server {
        listen 10000 default_server;
        server_name _;

        # ── WebSocket relay ──────────────────────────────
        # Match /ws and /ws/ for WebSocket upgrade
        location /ws {
            proxy_pass http://ws_relay;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Everything else → Bantu HTTP ────────────────
        location / {
            proxy_pass http://bantu_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}