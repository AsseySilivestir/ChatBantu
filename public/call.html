<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBantu — Call</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%B9%3C/text%3E%3C/svg%3E" />
</head>
<body class="call-page">
  <div style="width:100%;max-width:1100px;">
    <div class="call-status" id="call-status">Initializing…</div>
    <div class="call-container">
      <div class="call-video-box">
        <video id="local-video" autoplay muted playsinline></video>
        <div class="label">You</div>
      </div>
      <div class="call-video-box">
        <video id="remote-video" autoplay playsinline></video>
        <div class="label" id="remote-label">Remote</div>
      </div>
      <div class="call-controls">
        <button class="btn-circle" id="btn-mute" onclick="toggleMute()" title="Mute">🎤</button>
        <button class="btn-circle" id="btn-video" onclick="toggleVideo()" title="Toggle video">📹</button>
        <button class="btn-circle end" onclick="endCall()" title="End call">📵</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('redirect');

    // ─── Parse call params ───────────────────────────────
    const params  = new URLSearchParams(location.search);
    const peerId  = parseInt(params.get('peer'));
    const peerName= params.get('name') || 'User';
    const wantVideo = params.get('video') === '1';
    const direction  = params.get('dir') || 'out';

    document.getElementById('remote-label').textContent = peerName;

    // ─── ICE Configuration ───────────────────────────────
    // Public STUN servers work everywhere (Render, local, etc.).
    // Embedded TURN (port 3478) is available in local dev only —
    // on Render's single-port, TURN is unreachable, so we rely on STUN
    // which handles 90%+ of NAT scenarios. For production TURN,
    // configure an external TURN service (Twilio, Xirsys, etc.).
    const isLocal = location.port === '8080' || location.port === '';
    const ICE_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ].concat(
        isLocal
          ? [{ urls: 'turn:' + location.hostname + ':3478', username: 'bantu', credential: 'bantu123' }]
          : []
      )
    };

    let pc = null;
    let localStream = null;
    let remoteStream = null;
    let muted = false;
    let videoOff = false;

    function setStatus(text) {
      document.getElementById('call-status').textContent = text;
    }

    async function getLocalMedia() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: wantVideo
        });
      } catch (e) {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          toast('Camera unavailable — audio-only call');
        } catch (e2) {
          throw new Error('Cannot access microphone/camera: ' + e2.message);
        }
      }
      document.getElementById('local-video').srcObject = localStream;
    }

    function createPeerConnection() {
      pc = new RTCPeerConnection(ICE_CONFIG);

      // Add local tracks
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      // Receive remote tracks
      remoteStream = new MediaStream();
      document.getElementById('remote-video').srcObject = remoteStream;
      pc.ontrack = (event) => {
        event.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));
      };

      // ICE candidates → send via WebSocket (real-time, zero polling)
      pc.onicecandidate = (event) => {
        if (event.candidate) {
          WS.send(peerId, 'call_ice', { candidate: event.candidate });
        }
      };

      pc.onconnectionstatechange = () => {
        const state = pc.connectionState;
        setStatus('Connection: ' + state);
        if (state === 'disconnected' || state === 'failed' || state === 'closed') {
          setStatus('Call ended (' + state + ')');
          setTimeout(() => window.close(), 1500);
        }
      };

      pc.oniceconnectionstatechange = () => {
        const state = pc.iceConnectionState;
        if (state === 'connected' || state === 'completed') {
          setStatus('Connected — call in progress');
        }
      };
    }

    // ─── Caller flow ─────────────────────────────────────
    async function startAsCaller() {
      setStatus('Calling ' + peerName + '…');
      await getLocalMedia();
      createPeerConnection();

      const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
      await pc.setLocalDescription(offer);

      // Send offer via WebSocket — no polling
      WS.send(peerId, 'call_offer', { sdp: offer, video: wantVideo });
      setStatus('Ringing…');

      // Listen for answer via WebSocket
      WS.on('call_answer', onAnswer);
      WS.on('call_ice', onIceCandidate);
      WS.on('call_hangup', onHangup);
    }

    // ─── Callee flow ─────────────────────────────────────
    async function startAsCallee(offerData) {
      setStatus('Incoming call from ' + peerName + ' — accepting…');
      await getLocalMedia();
      createPeerConnection();

      const offer = new RTCSessionDescription(offerData.sdp);
      await pc.setRemoteDescription(offer);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      // Send answer via WebSocket — instant
      WS.send(peerId, 'call_answer', { sdp: answer });

      WS.on('call_ice', onIceCandidate);
      WS.on('call_hangup', onHangup);
    }

    // ─── WebSocket event handlers ────────────────────────
    function onAnswer(msg) {
      if (msg.from !== peerId) return;
      WS.off('call_answer', onAnswer);
      const answer = new RTCSessionDescription(msg.data.sdp);
      pc.setRemoteDescription(answer).then(() => {
        setStatus('Connected — call in progress');
      }).catch(e => {
        setStatus('Error setting answer: ' + e.message);
      });
    }

    function onIceCandidate(msg) {
      if (msg.from !== peerId) return;
      if (msg.data && msg.data.candidate) {
        try {
          pc.addIceCandidate(new RTCIceCandidate(msg.data.candidate));
        } catch (e) { /* ignore stale candidates */ }
      }
    }

    function onHangup(msg) {
      if (msg.from !== peerId) return;
      setStatus('Call ended by ' + peerName);
      cleanupCall();
      setTimeout(() => window.close(), 1500);
    }

    // ─── Controls ────────────────────────────────────────
    function toggleMute() {
      if (!localStream) return;
      muted = !muted;
      localStream.getAudioTracks().forEach(t => t.enabled = !muted);
      document.getElementById('btn-mute').textContent = muted ? '🔇' : '🎤';
    }

    function toggleVideo() {
      if (!localStream) return;
      videoOff = !videoOff;
      localStream.getVideoTracks().forEach(t => t.enabled = !videoOff);
      document.getElementById('btn-video').textContent = videoOff ? '🚫' : '📹';
    }

    async function endCall() {
      // Notify peer via WebSocket
      WS.send(peerId, 'call_hangup', {});
      setStatus('Call ended');
      cleanupCall();
      setTimeout(() => window.close(), 1000);
    }

    function cleanupCall() {
      WS.off('call_answer', onAnswer);
      WS.off('call_ice', onIceCandidate);
      WS.off('call_hangup', onHangup);
      if (pc) { try { pc.close(); } catch(e) {} pc = null; }
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    }

    // Cleanup on tab close
    window.addEventListener('beforeunload', () => {
      WS.send(peerId, 'call_hangup', {});
      cleanupCall();
    });

    // ─── Bootstrap ───────────────────────────────────────
    (async function() {
      // Wait for WebSocket to be connected
      if (!WS.isConnected()) {
        WS.on('connected', () => bootstrap());
        setStatus('Connecting to server…');
        return;
      }
      bootstrap();
    })();

    async function bootstrap() {
      try {
        if (direction === 'out') {
          await startAsCaller();
        } else {
          // For incoming calls, the offer comes via WebSocket.
          // The chat.html or feed.html page will open this window
          // after receiving a call_offer event.
          setStatus('Waiting for call signal…');
          WS.on('call_offer', function onOffer(msg) {
            if (msg.from !== peerId) return;
            WS.off('call_offer', onOffer);
            startAsCallee(msg.data);
          });
        }
      } catch (e) {
        setStatus('Error: ' + e.message);
        toast(e.message, 5000);
      }
    }
  </script>
</body>
</html>
