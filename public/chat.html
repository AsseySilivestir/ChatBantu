<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBantu — Messages</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%AC%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-header">
        <div>
          <h1>Messages</h1>
          <p>Real-time chat via WebSocket</p>
        </div>
      </div>

      <div class="chat-layout">
        <div class="chat-sidebar">
          <h3>Conversations</h3>
          <div id="conv-list"></div>
        </div>
        <div class="chat-panel" id="chat-panel">
          <div class="empty-state">
            <div class="icon">💬</div>
            <h2>Select a conversation</h2>
            <p>Pick someone on the left to start chatting.<br/>Or browse <a href="/people.html">people</a> to find someone new.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Incoming call overlay -->
  <div class="call-overlay hidden" id="call-overlay">
    <div class="call-overlay-box">
      <div class="call-overlay-icon" id="call-overlay-icon">📞</div>
      <div class="call-overlay-name" id="call-overlay-name">Unknown</div>
      <div class="call-overlay-type" id="call-overlay-type">Voice call</div>
      <div class="call-overlay-actions">
        <button class="btn-circle end call-overlay-btn" onclick="declineCall()" title="Decline">📵</button>
        <button class="btn-circle call-overlay-btn accept" onclick="acceptCall()" title="Accept" style="background:#27ae60">📞</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('redirect');
    renderSidebar('chat');

    let activePeer = null;
    let lastMsgId = 0;
    let incomingCallFrom = null;

    // ─── Load conversation list ─────────────────────────────
    async function loadConversations() {
      try {
        const r = await api.get('/api/conversations');
        if (r && r.error) return;
        const el = document.getElementById('conv-list');
        if (!r.conversations || r.conversations.length === 0) {
          el.innerHTML = '<p style="color:#7a6a5a;font-size:13px;padding:8px">No conversations yet. <a href="/people.html">Find someone to chat with</a>.</p>';
          return;
        }
        el.innerHTML = r.conversations.map(c => {
          const isOnline = WS.isUserOnline(c.peer.id) || c.peer.online;
          return `
          <div class="conv-item ${activePeer == c.peer.id ? 'active' : ''}" onclick="openChat(${c.peer.id}, '${escapeHtml(c.peer.displayName)}')">
            <div class="avatar">${avatarLetter(c.peer.displayName)}</div>
            <div class="info">
              <div class="name">${escapeHtml(c.peer.displayName)}</div>
              <div class="last-msg">${escapeHtml(c.lastMessage.body.slice(0, 40))}</div>
            </div>
            <div class="dot ${isOnline ? '' : 'offline'}"></div>
          </div>`;
        }).join('');
      } catch (e) { /* ignore */ }
    }

    // ─── Open a chat with a peer ────────────────────────────
    async function openChat(peerId, peerName) {
      activePeer = peerId;
      lastMsgId = 0;
      const isOnline = WS.isUserOnline(peerId);
      const panel = document.getElementById('chat-panel');
      panel.innerHTML = `
        <div class="chat-head">
          <div class="avatar" id="peer-avatar">${avatarLetter(peerName)}</div>
          <div>
            <div class="name" id="peer-name">${escapeHtml(peerName)}</div>
            <div class="status" id="peer-status">${isOnline ? '🟢 Online' : 'Offline'}</div>
          </div>
          <div class="call-btns">
            <button class="call-btn" title="Voice call" onclick="startCall('${escapeHtml(peerName)}', ${peerId}, false)">📞</button>
            <button class="call-btn" title="Video call" onclick="startCall('${escapeHtml(peerName)}', ${peerId}, true)">📹</button>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
          <input id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()" autofocus />
          <button class="btn btn-primary" onclick="sendMsg()">Send</button>
        </div>
      `;
      document.getElementById('msg-input').focus();
      await loadConversations();
      // Pull message history once (no polling)
      await loadHistory();
    }

    async function loadHistory() {
      if (!activePeer) return;
      try {
        const r = await api.get('/api/messages/' + activePeer);
        if (r && r.error) return;
        const msgs = r.messages || [];
        const me = api.user();
        const box = document.getElementById('chat-messages');
        if (!box) return;
        box.innerHTML = '';
        msgs.forEach(m => {
          const mine = m.fromId == me.id;
          const div = document.createElement('div');
          div.className = 'msg-bubble ' + (mine ? 'me' : 'them');
          div.innerHTML = escapeHtml(m.body) + '<span class="time">' + (m.createdAt || '').slice(11, 16) + '</span>';
          box.appendChild(div);
          if (m.id > lastMsgId) lastMsgId = m.id;
        });
        box.scrollTop = box.scrollHeight;
      } catch (e) { /* ignore */ }
    }

    // ─── Real-time message handler ──────────────────────────
    // This fires the instant a message arrives via WebSocket
    function onRealTimeMessage(msg) {
      const me = api.user();
      // Only show if it's for the active chat, or refresh conv list
      if (msg.data && msg.from) {
        if (activePeer == msg.from) {
          // Append to active chat
          const box = document.getElementById('chat-messages');
          if (box) {
            const div = document.createElement('div');
            div.className = 'msg-bubble them';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = escapeHtml(msg.data.body || msg.data) + '<span class="time">' + time + '</span>';
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
          }
        }
        // Always refresh conversation list on new message
        loadConversations();
      }
    }

    // ─── Send message via HTTP (persists to DB) ─────────────
    // The recipient gets it in real-time via the WS relay
    async function sendMsg() {
      if (!activePeer) return;
      const inp = document.getElementById('msg-input');
      const body = inp.value.trim();
      if (!body) return;
      inp.value = '';
      try {
        const r = await api.post('/api/messages/' + activePeer, { body });
        if (r && r.error) { toast(r.error); return; }
        // Show our own message instantly in the chat
        const box = document.getElementById('chat-messages');
        if (box) {
          const div = document.createElement('div');
          div.className = 'msg-bubble me';
          const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          div.innerHTML = escapeHtml(body) + '<span class="time">' + time + '</span>';
          box.appendChild(div);
          box.scrollTop = box.scrollHeight;
        }
      } catch (e) {
        toast('Failed to send: ' + e.message);
      }
    }

    // ─── Call actions ───────────────────────────────────────
    function startCall(peerName, peerId, video) {
      const params = new URLSearchParams({ peer: peerId, name: peerName, video: video ? '1' : '0', dir: 'out' });
      window.open('/call.html?' + params.toString(), '_blank', 'width=1100,height=800');
    }

    // ─── Incoming call UI ───────────────────────────────────
    function onIncomingCall(msg) {
      if (msg.data && msg.from) {
        incomingCallFrom = msg.from;
        const hasVideo = msg.data.video;
        document.getElementById('call-overlay-name').textContent = msg.fromName || 'Unknown';
        document.getElementById('call-overlay-icon').textContent = hasVideo ? '📹' : '📞';
        document.getElementById('call-overlay-type').textContent = hasVideo ? 'Video call' : 'Voice call';
        document.getElementById('call-overlay').classList.remove('hidden');
      }
    }

    function acceptCall() {
      if (!incomingCallFrom) return;
      const name = document.getElementById('call-overlay-name').textContent;
      const hasVideo = document.getElementById('call-overlay-type').textContent === 'Video call';
      document.getElementById('call-overlay').classList.add('hidden');
      const params = new URLSearchParams({
        peer: incomingCallFrom,
        name: name,
        video: hasVideo ? '1' : '0',
        dir: 'in'
      });
      window.open('/call.html?' + params.toString(), '_blank', 'width=1100,height=800');
      incomingCallFrom = null;
    }

    function declineCall() {
      if (incomingCallFrom) {
        WS.send(incomingCallFrom, 'call_hangup', {});
      }
      document.getElementById('call-overlay').classList.add('hidden');
      incomingCallFrom = null;
    }

    // ─── Real-time presence updates ─────────────────────────
    function onPresenceUpdate() {
      loadConversations();
      // Update active chat status dot
      if (activePeer) {
        const statusEl = document.getElementById('peer-status');
        if (statusEl) {
          statusEl.textContent = WS.isUserOnline(activePeer) ? '🟢 Online' : 'Offline';
        }
      }
    }

    // ─── Bootstrap ──────────────────────────────────────────
    (async function init() {
      // Register real-time WebSocket listeners (no polling)
      WS.on('message', onRealTimeMessage);
      WS.on('call_offer', onIncomingCall);
      WS.on('presence', onPresenceUpdate);

      const params = new URLSearchParams(location.search);
      const peer = params.get('peer');
      if (peer) {
        try {
          const users = await api.get('/api/users');
          const u = (users.users || []).find(x => x.id == peer);
          const name = u ? u.displayName : 'User';
          await loadConversations();
          openChat(parseInt(peer), name);
          return;
        } catch (e) { /* fall through */ }
      }
      await loadConversations();
    })();
  </script>
</body>
</html>
