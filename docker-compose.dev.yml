# ════════════════════════════════════════════════════════════════════
#  ChatBantu — Local Development docker-compose
#
#  One-command local dev with Docker — no need to install anything
#  on your host. Nginx + wsrelay + Bantu, all bundled.
#
#     ./dev.sh --docker
#
#  Then open http://localhost:8080
#
#  Architecture inside the container:
#    :8080 (nginx)  →  /ws/*  → wsrelay :8081
#                   →  /*     → Bantu  :8080 (internal)
# ════════════════════════════════════════════════════════════════════

services:
  chatbantu:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: chatbantu:dev
    container_name: chatbantu-dev
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
    volumes:
      # Persist SQLite DB across restarts
      - chatbantu-data:/data
      # Live-reload the Bantu source code (edit on host, container sees it)
      - ./server.b:/app/server.b:ro
      - ./public:/app/public:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${PORT:-8080}/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  chatbantu-data:
    driver: local